version: "3.9"

services:
  # ── Local LLM ──────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: nexus-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]  # Optional: remove if no GPU
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── NEXUS API ──────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexus-app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./demo_corpus:/app/demo_corpus

volumes:
  ollama_data:
