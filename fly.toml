# fly.toml app configuration generated for nexus-backend

app = "nexus-backend"
primary_region = "iad"

[build]
dockerfile = "Dockerfile"

[env]
GROQ_API_KEY = ""
GROQ_MODEL = "llama-3.3-70b-versatile"
SUPABASE_URL = ""
SUPABASE_KEY = ""
EMBED_MODEL = "sentence-transformers/all-MiniLM-L6-v2"
EMBED_DIM = "384"
CHUNK_SIZE = "800"
CHUNK_OVERLAP = "120"
RETRIEVAL_K = "8"
RERANK_K = "4"
ALLOWED_ORIGINS = "https://nexus.skay.dev,http://localhost:3000"
MAX_QUERIES_PER_SESSION = "20"
DEMO_DATA_PATH = "./demo_corpus"
LOG_LEVEL = "INFO"
LOG_FORMAT = "json"

[[services]]
internal_port = 8000
processes = ["app"]

[services.http_checks]
enabled = true
grace_period = "30s"
interval = "15s"
method = "GET"
min_response_size = 1
path = "/health"
protocol = "http"
restart_limit = 5
timeout = "5s"

[[services.ports]]
handlers = ["http"]
port = 80

[[services.ports]]
handlers = ["tls", "http"]
port = 443

[services.concurrency]
hard_limit = 25
soft_limit = 20
type = "connections"
